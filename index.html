<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0f1e">
<title>TradeSinyalPro</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0f1e; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  .header { background: #111827; border-bottom: 1px solid #1e293b; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 16px; font-weight: 600; color: #fff; }
  .logo span { color: #3b82f6; }
  .live-badge { background: #052e16; color: #4ade80; font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
  .live-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .tabs { display: flex; background: #111827; border-bottom: 1px solid #1e293b; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab { flex: 1; min-width: 74px; white-space: nowrap; padding: 12px 4px; text-align: center; font-size: 11px; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }
  .content { padding: 12px; max-width: 600px; margin: 0 auto; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat-card { background: #111827; border: 1px solid #1e293b; border-radius: 12px; padding: 12px; }
  .stat-label { font-size: 11px; color: #64748b; margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 600; }
  .stat-val.green { color: #4ade80; }
  .stat-val.red { color: #f87171; }
  .stat-val.blue { color: #60a5fa; }
  .dom-bar { background: #1e293b; border-radius: 6px; height: 6px; overflow: hidden; margin-top: 8px; }
  .dom-fill { height: 100%; border-radius: 6px; }
  .price-change { font-size: 13px; font-weight: 500; margin-top: 4px; }
  .price-change.up { color: #4ade80; }
  .price-change.down { color: #f87171; }
  .market-note { font-size: 11px; color: #64748b; padding: 10px 12px; background: #111827; border: 1px dashed #334155; border-radius: 10px; margin-bottom: 8px; }
  .section-title { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; margin: 16px 0 8px; }
  .signal-card { background: #111827; border: 1px solid #1e293b; border-radius: 12px; padding: 14px; margin-bottom: 8px; }
  .signal-card.long { border-left: 3px solid #4ade80; }
  .signal-card.short { border-left: 3px solid #f87171; }
  .signal-card.tp { border-left: 3px solid #60a5fa; opacity: 0.7; }
  .signal-card.stop { border-left: 3px solid #f87171; opacity: 0.7; }
  .sig-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .sig-symbol { font-size: 14px; font-weight: 600; }
  .sig-badges { display: flex; gap: 6px; align-items: center; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; }
  .badge.long { background: #052e16; color: #4ade80; }
  .badge.short { background: #2d0a0a; color: #f87171; }
  .badge.tp { background: #0c1a3d; color: #60a5fa; }
  .badge.stop { background: #2d0a0a; color: #f87171; }
  .badge.bot { background: #1e1b4b; color: #a5b4fc; }
  .badge.kripto { background: #1e1b4b; color: #a5b4fc; }
  .badge.pozitif { background: #052e16; color: #4ade80; }
  .badge.negatif { background: #2d0a0a; color: #f87171; }
  .badge.notr { background: #422006; color: #f59e0b; }
  .sig-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .sig-key { font-size: 12px; color: #64748b; }
  .sig-val { font-size: 12px; font-weight: 500; }
  .sig-val.green { color: #4ade80; }
  .sig-val.red { color: #f87171; }
  .sig-val.blue { color: #60a5fa; }
  .sig-time { font-size: 11px; color: #475569; margin-top: 8px; }
  .empty { text-align: center; padding: 40px 20px; color: #475569; font-size: 14px; }
  .refresh-btn { background: #1e293b; border: none; color: #94a3b8; padding: 8px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; }
  .bot-filter { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; }
  .bot-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; white-space: nowrap; }
  .bot-btn.active { background: #1e3a8a; border-color: #3b82f6; color: #93c5fd; }
  .loading { text-align: center; padding: 30px; color: #475569; }
  .error { background: #2d0a0a; border: 1px solid #7f1d1d; border-radius: 12px; padding: 16px; text-align: center; color: #f87171; font-size: 13px; margin: 16px 0; }
  .news-card { background: #111827; border: 1px solid #1e293b; border-radius: 12px; padding: 14px; margin-bottom: 8px; }
  .news-card.pozitif { border-left: 3px solid #4ade80; }
  .news-card.negatif { border-left: 3px solid #f87171; }
  .news-card.notr { border-left: 3px solid #f59e0b; }
  .news-header { display: flex; justify-content: flex-start; margin-bottom: 8px; }
  .news-badges { display: flex; gap: 4px; }
  .news-title { font-size: 13px; font-weight: 500; color: #e2e8f0; margin-bottom: 6px; line-height: 1.4; }
  .news-bullets { padding: 0; margin: 0; }
  .news-bullet { font-size: 11px; color: #94a3b8; margin-bottom: 3px; padding-left: 12px; position: relative; list-style: none; }
  .news-bullet::before { content: "•"; position: absolute; left: 0; color: #475569; }
  .news-time { font-size: 11px; color: #475569; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Trade<span>Sinyal</span>Pro</div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="refresh-btn" onclick="veriYukle()">&#8635; Yenile</button>
    <div class="live-badge"><div class="live-dot"></div>Canli</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="sekmeAc('sinyaller',this)">Sinyaller</div>
  <div class="tab" onclick="sekmeAc('performans',this)">Performans</div>
  <div class="tab" onclick="sekmeAc('gecmis',this)">Gecmis</div>
  <div class="tab" onclick="sekmeAc('rapor',this)">Gunluk Rapor</div>
  <div class="tab" onclick="sekmeAc('piyasa',this)">Piyasa</div>
  <div class="tab" onclick="sekmeAc('haberler',this)">Haberler</div>
</div>

<div class="content">
  <div id="sinyaller">
    <div class="bot-filter">
      <button class="bot-btn active" onclick="botFiltre('hepsi',this)">Tumu</button>
      <button class="bot-btn" onclick="botFiltre('SINYAL_ODA_1',this)">Sinyal Oda 1</button>
      <button class="bot-btn" onclick="botFiltre('SINYAL_ODA_2',this)">Sinyal Oda 2</button>
      <button class="bot-btn" onclick="botFiltre('SINYAL_ODA_3',this)">Sinyal Oda 3</button>
      <button class="bot-btn" onclick="botFiltre('SINYAL_ODA_4',this)">Sinyal Oda 4</button>
    </div>
    <div id="sinyal-listesi"><div class="loading">Yukleniyor...</div></div>
  </div>

  <div id="performans" style="display:none">
    <div id="performans-icerik"><div class="loading">Yukleniyor...</div></div>
  </div>

  <div id="gecmis" style="display:none">
    <div id="gecmis-icerik"><div class="loading">Yukleniyor...</div></div>
  </div>

  <div id="rapor" style="display:none">
    <div id="rapor-icerik"><div class="loading">Yukleniyor...</div></div>
  </div>

  <div id="piyasa" style="display:none;padding:8px 12px">
    <div class="tradingview-widget-container" style="height:520px">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
      {
        "colorTheme": "dark",
        "dateRange": "1D",
        "showChart": false,
        "locale": "tr",
        "isTransparent": true,
        "showSymbolLogo": true,
        "showFloatingTooltip": false,
        "width": "100%",
        "height": "520",
        "plotLineColorGrowing": "rgba(74, 222, 128, 1)",
        "plotLineColorFalling": "rgba(248, 113, 113, 1)",
        "gridLineColor": "rgba(30, 41, 59, 0)",
        "scaleFontColor": "rgba(148, 163, 184, 1)",
        "belowLineFillColorGrowing": "rgba(74, 222, 128, 0.12)",
        "belowLineFillColorFalling": "rgba(248, 113, 113, 0.12)",
        "belowLineFillColorGrowingBottom": "rgba(74, 222, 128, 0)",
        "belowLineFillColorFallingBottom": "rgba(248, 113, 113, 0)",
        "symbolActiveColor": "rgba(59, 130, 246, 0.12)",
        "tabs": [
          {
            "title": "Piyasa",
            "symbols": [
              { "s": "BINANCE:BTCUSDT", "d": "Bitcoin" },
              { "s": "BINANCE:ETHUSDT", "d": "Ethereum" },
              { "s": "CRYPTOCAP:TOTAL", "d": "Toplam Piyasa Degeri" },
              { "s": "CRYPTOCAP:BTC.D", "d": "BTC Dominans" },
              { "s": "CRYPTOCAP:ETH.D", "d": "ETH Dominans" },
              { "s": "CRYPTOCAP:USDT.D", "d": "USDT Dominans" },
              { "s": "CRYPTOCAP:OTHERS.D", "d": "Diger Dominans" }
            ],
            "originalTitle": "Piyasa"
          }
        ]
      }
      </script>
    </div>
  </div>

  <div id="haberler" style="display:none">
    <div class="bot-filter">
      <button class="bot-btn active" onclick="haberFiltre('hepsi',this)">Tumu</button>
      <button class="bot-btn" onclick="haberFiltre('kripto',this)">Kripto</button>
      <button class="bot-btn" onclick="haberFiltre('ekonomi',this)">Ekonomi</button>
      <button class="bot-btn" onclick="haberFiltre('fed',this)">Fed</button>
      <button class="bot-btn" onclick="haberFiltre('jeopolitik',this)">Jeopolitik</button>
    </div>
    <div id="haber-listesi"><div class="loading">Yukleniyor...</div></div>
  </div>
</div>

<script>
var API = "https://abundant-light-production-fb25.up.railway.app";
var API_KEY = "tradesinyalpro2024";
var tumVeriler = {};
var tumHaberler = [];
var tumRaporlar = [];
var piyasaVerisi = null;
var piyasaSonGuncelleme = 0;
var aktifBot = "hepsi";
var aktifHaberKategori = "hepsi";
var aktifSekme = "sinyaller";

var BOT_ADLARI = {
  "SINYAL_ODA_1": "Sinyal Oda 1",
  "SINYAL_ODA_2": "Sinyal Oda 2",
  "SINYAL_ODA_3": "Sinyal Oda 3",
  "SINYAL_ODA_4": "Sinyal Oda 4"
};

function botAdi(bot) {
  return BOT_ADLARI[bot] || bot;
}

function veriYukle() {
  var xhr = new XMLHttpRequest();
  xhr.open("GET", API + "/sinyaller", true);
  xhr.setRequestHeader("X-API-Key", API_KEY);
  xhr.onload = function() {
    if (xhr.status === 200) {
      tumVeriler = JSON.parse(xhr.responseText);
      guncelle();
    } else {
      document.getElementById("sinyal-listesi").innerHTML =
        '<div class="error">API hatasi: ' + xhr.status + '</div>';
    }
  };
  xhr.onerror = function() {
    document.getElementById("sinyal-listesi").innerHTML =
      '<div class="error">API\'ye baglanılamadi.</div>';
  };
  xhr.send();

  var xhr2 = new XMLHttpRequest();
  xhr2.open("GET", API + "/haberler", true);
  xhr2.setRequestHeader("X-API-Key", API_KEY);
  xhr2.onload = function() {
    if (xhr2.status === 200) {
      tumHaberler = JSON.parse(xhr2.responseText);
      if (aktifSekme === "haberler") haberleriGoster();
    }
  };
  xhr2.send();

  var xhr3 = new XMLHttpRequest();
  xhr3.open("GET", API + "/raporlar", true);
  xhr3.setRequestHeader("X-API-Key", API_KEY);
  xhr3.onload = function() {
    if (xhr3.status === 200) {
      tumRaporlar = JSON.parse(xhr3.responseText);
      if (aktifSekme === "rapor") raporGoster();
    }
  };
  xhr3.send();
}

function guncelle() {
  if (aktifSekme === "sinyaller") sinyalleriGoster();
  if (aktifSekme === "performans") performansGoster();
  if (aktifSekme === "gecmis") gecmisGoster();
  if (aktifSekme === "rapor") raporGoster();
  if (aktifSekme === "haberler") haberleriGoster();
}

function sinyalleriGoster() {
  var html = "";
  var hepsi = [];
  var botlar = Object.keys(tumVeriler);
  for (var b = 0; b < botlar.length; b++) {
    var bot = botlar[b];
    var data = tumVeriler[bot];
    if (aktifBot !== "hepsi" && aktifBot !== bot) continue;
    var sinyaller = (data.sinyaller || []).filter(function(s) { return s.durum === "aktif"; });
    for (var i = 0; i < sinyaller.length; i++) {
      hepsi.push({ s: sinyaller[i], bot: bot });
    }
  }
  hepsi.sort(function(a, b) { return (b.s.zaman || "").localeCompare(a.s.zaman || ""); });

  for (var k = 0; k < hepsi.length; k++) {
    var s = hepsi[k].s;
    var bot = hepsi[k].bot;
    var yon = s.yon || "";
    var cls = yon === "LONG" ? "long" : "short";
    var e1html = s.e1 ? '<div class="sig-row"><span class="sig-key">E1</span><span class="sig-val blue">' + s.e1 + '</span></div>' : "";
    var e2html = s.e2 ? '<div class="sig-row"><span class="sig-key">E2</span><span class="sig-val blue">' + s.e2 + '</span></div>' : "";
    var e3html = s.e3 ? '<div class="sig-row"><span class="sig-key">E3</span><span class="sig-val blue">' + s.e3 + '</span></div>' : "";
    var kademehtml = s.asama ? '<div class="sig-row"><span class="sig-key">Kademe</span><span class="sig-val">' + s.asama + '</span></div>' : "";
    html += '<div class="signal-card ' + cls + '">';
    html += '<div class="sig-header"><div class="sig-symbol">#' + s.sembol + '</div>';
    html += '<div class="sig-badges"><span class="badge ' + cls + '">' + yon + '</span>';
    html += '<span class="badge bot">' + botAdi(bot) + '</span></div></div>';
    html += '<div class="sig-row"><span class="sig-key">Giris</span><span class="sig-val">' + (s.giris || s.maliyet || "-") + '</span></div>';
    html += '<div class="sig-row"><span class="sig-key">Hedef</span><span class="sig-val green">' + (s.hedef || "-") + '</span></div>';
    html += '<div class="sig-row"><span class="sig-key">Stop</span><span class="sig-val red">' + (s.stop || "-") + '</span></div>';
    html += e1html + e2html + e3html + kademehtml;
    html += '<div class="sig-time">' + (s.zaman || "") + '</div></div>';
  }
  if (hepsi.length === 0) html = '<div class="empty">Su an aktif sinyal yok</div>';
  document.getElementById("sinyal-listesi").innerHTML = html;
}

function performansGoster() {
  var html = "";
  var toplamTp = 0, toplamStop = 0, toplamAktif = 0;
  var botlar = Object.keys(tumVeriler);
  for (var b = 0; b < botlar.length; b++) {
    var bot = botlar[b];
    var data = tumVeriler[bot];
    var tp = data.tp || 0;
    var stop = data.stop || 0;
    var aktif = 0;
    var sinyaller = data.sinyaller || [];
    for (var i = 0; i < sinyaller.length; i++) {
      if (sinyaller[i].durum === "aktif") aktif++;
    }
    var toplam = tp + stop;
    var basari = toplam > 0 ? Math.round(tp / toplam * 100) : 0;
    toplamTp += tp; toplamStop += stop; toplamAktif += aktif;
    html += '<div class="signal-card" style="margin-bottom:8px">';
    html += '<div class="sig-header"><div class="sig-symbol">' + botAdi(bot) + '</div>';
    html += '<span class="badge bot">' + basari + '% basari</span></div>';
    html += '<div class="sig-row"><span class="sig-key">TP</span><span class="sig-val green">' + tp + '</span></div>';
    html += '<div class="sig-row"><span class="sig-key">Stop</span><span class="sig-val red">' + stop + '</span></div>';
    html += '<div class="sig-row"><span class="sig-key">Aktif</span><span class="sig-val blue">' + aktif + '</span></div></div>';
  }
  var genelToplam = toplamTp + toplamStop;
  var genelBasari = genelToplam > 0 ? Math.round(toplamTp / genelToplam * 100) : 0;
  var ozet = '<div class="stats-grid">';
  ozet += '<div class="stat-card"><div class="stat-label">Toplam TP</div><div class="stat-val green">' + toplamTp + '</div></div>';
  ozet += '<div class="stat-card"><div class="stat-label">Toplam Stop</div><div class="stat-val red">' + toplamStop + '</div></div>';
  ozet += '<div class="stat-card"><div class="stat-label">Aktif Sinyal</div><div class="stat-val blue">' + toplamAktif + '</div></div>';
  ozet += '<div class="stat-card"><div class="stat-label">Genel Basari</div><div class="stat-val green">' + genelBasari + '%</div></div></div>';
  ozet += '<div class="section-title">Oda Bazli Performans</div>';
  document.getElementById("performans-icerik").innerHTML = ozet + html;
}

function gecmisGoster() {
  var html = "";
  var hepsi = [];
  var botlar = Object.keys(tumVeriler);
  for (var b = 0; b < botlar.length; b++) {
    var bot = botlar[b];
    var data = tumVeriler[bot];
    var sinyaller = data.sinyaller || [];
    for (var i = 0; i < sinyaller.length; i++) {
      var s = sinyaller[i];
      if (s.durum !== "tp" && s.durum !== "stop") continue;
      hepsi.push({ s: s, bot: bot });
    }
  }
  hepsi.sort(function(a, b) {
    var za = a.s.sonuc_zamani || a.s.zaman || "";
    var zb = b.s.sonuc_zamani || b.s.zaman || "";
    return zb.localeCompare(za);
  });

  for (var k = 0; k < hepsi.length; k++) {
    var s = hepsi[k].s;
    var bot = hepsi[k].bot;
    var sonuc = s.durum === "tp" ? "tp" : "stop";
    var sonucYazi = s.durum === "tp" ? "TP" : "Stop";
    var yon = s.yon || "";
    html += '<div class="signal-card ' + sonuc + '">';
    html += '<div class="sig-header"><div class="sig-symbol">#' + s.sembol + '</div>';
    html += '<div class="sig-badges"><span class="badge ' + sonuc + '">' + sonucYazi + '</span>';
    html += '<span class="badge bot">' + botAdi(bot) + '</span></div></div>';
    html += '<div class="sig-row"><span class="sig-key">Yon</span><span class="sig-val">' + yon + '</span></div>';
    html += '<div class="sig-row"><span class="sig-key">Giris</span><span class="sig-val">' + (s.giris || s.maliyet || "-") + '</span></div>';
    html += '<div class="sig-time">' + (s.sonuc_zamani || s.zaman || "") + '</div></div>';
  }
  if (hepsi.length === 0) html = '<div class="empty">Henuz tamamlanmis islem yok</div>';
  document.getElementById("gecmis-icerik").innerHTML = html;
}

function raporGoster() {
  if (!tumRaporlar || tumRaporlar.length === 0) {
    document.getElementById("rapor-icerik").innerHTML = '<div class="empty">Henuz gunluk rapor yok (ilk rapor gece 03:00\'te olusur)</div>';
    return;
  }
  var gruplar = {};
  var tarihler = [];
  for (var i = 0; i < tumRaporlar.length; i++) {
    var r = tumRaporlar[i];
    if (!gruplar[r.tarih]) { gruplar[r.tarih] = []; tarihler.push(r.tarih); }
    gruplar[r.tarih].push(r);
  }
  tarihler.sort(function(a, b) { return b.localeCompare(a); });

  var html = "";
  for (var t = 0; t < tarihler.length; t++) {
    var tarih = tarihler[t];
    var kayitlar = gruplar[tarih].slice();
    kayitlar.sort(function(a, b) { return (a.bot || "").localeCompare(b.bot || ""); });
    var gunTp = 0, gunStop = 0;
    for (var k = 0; k < kayitlar.length; k++) { gunTp += kayitlar[k].tp; gunStop += kayitlar[k].stop; }
    var gunToplam = gunTp + gunStop;
    var gunBasari = gunToplam > 0 ? Math.round(gunTp / gunToplam * 100) : 0;

    html += '<div class="section-title">' + tarih + ' &nbsp;·&nbsp; Gun Toplami: ' + gunTp + ' TP / ' + gunStop + ' Stop (%' + gunBasari + ')</div>';
    for (var k2 = 0; k2 < kayitlar.length; k2++) {
      var r = kayitlar[k2];
      var toplam = r.tp + r.stop;
      var basari = toplam > 0 ? Math.round(r.tp / toplam * 100) : 0;
      html += '<div class="signal-card" style="margin-bottom:8px">';
      html += '<div class="sig-header"><div class="sig-symbol">' + botAdi(r.bot) + '</div>';
      html += '<span class="badge bot">' + basari + '% basari</span></div>';
      html += '<div class="sig-row"><span class="sig-key">TP</span><span class="sig-val green">' + r.tp + '</span></div>';
      html += '<div class="sig-row"><span class="sig-key">Stop</span><span class="sig-val red">' + r.stop + '</span></div>';
      html += '</div>';
    }
  }
  document.getElementById("rapor-icerik").innerHTML = html;
}

function piyasaYukle(zorla) {
  var simdi = Date.now();
  if (!zorla && piyasaVerisi && (simdi - piyasaSonGuncelleme < 15000)) {
    piyasaGoster();
    return;
  }
  document.getElementById("piyasa-icerik").innerHTML = '<div class="loading">Yukleniyor...</div>';

  var fiyatlar = null, global = null;

  function tamamlandiKontrol() {
    if (fiyatlar && global) {
      piyasaVerisi = { fiyatlar: fiyatlar, global: global };
      piyasaSonGuncelleme = Date.now();
      piyasaGoster();
    }
  }

  // Fiyatlar: Binance'in anlik borsa verisinden (TradingView ile ayni kaynaga yakin)
  var x1 = new XMLHttpRequest();
  x1.open("GET", "https://api.binance.com/api/v3/ticker/24hr?symbols=%5B%22BTCUSDT%22%2C%22ETHUSDT%22%5D", true);
  x1.onload = function() {
    if (x1.status === 200) {
      var arr = JSON.parse(x1.responseText);
      fiyatlar = {};
      for (var i = 0; i < arr.length; i++) {
        if (arr[i].symbol === "BTCUSDT") fiyatlar.bitcoin = { usd: parseFloat(arr[i].lastPrice), usd_24h_change: parseFloat(arr[i].priceChangePercent) };
        if (arr[i].symbol === "ETHUSDT") fiyatlar.ethereum = { usd: parseFloat(arr[i].lastPrice), usd_24h_change: parseFloat(arr[i].priceChangePercent) };
      }
      tamamlandiKontrol();
    } else piyasaHata();
  };
  x1.onerror = piyasaHata;
  x1.send();

  // Piyasa degeri ve dominans: CoinGecko /global (turetilmis istatistik, dogasi geregi birkac dk'da bir guncellenir)
  var x2 = new XMLHttpRequest();
  x2.open("GET", "https://api.coingecko.com/api/v3/global", true);
  x2.onload = function() {
    if (x2.status === 200) { global = JSON.parse(x2.responseText).data; tamamlandiKontrol(); }
    else piyasaHata();
  };
  x2.onerror = piyasaHata;
  x2.send();
}

function piyasaHata() {
  if (aktifSekme === "piyasa" && !piyasaVerisi) {
    document.getElementById("piyasa-icerik").innerHTML = '<div class="error">Piyasa verisi alinamadi. Internet baglantisini kontrol edip tekrar dene.</div>';
  }
}

function piyasaGoster() {
  if (!piyasaVerisi) return;
  var f = piyasaVerisi.fiyatlar;
  var g = piyasaVerisi.global;

  var btcFiyat = f.bitcoin ? f.bitcoin.usd : null;
  var btcDegisim = f.bitcoin ? f.bitcoin.usd_24h_change : null;
  var ethFiyat = f.ethereum ? f.ethereum.usd : null;
  var ethDegisim = f.ethereum ? f.ethereum.usd_24h_change : null;

  var toplamDeger = g.total_market_cap ? g.total_market_cap.usd : null;
  var toplamDegisim = g.market_cap_change_percentage_24h_usd;

  var btcD = g.market_cap_percentage ? g.market_cap_percentage.btc : null;
  var ethD = g.market_cap_percentage ? g.market_cap_percentage.eth : null;
  var usdtD = g.market_cap_percentage ? g.market_cap_percentage.usdt : null;
  var othersD = null;
  if (g.market_cap_percentage) {
    var toplamBilinen = 0;
    var anahtarlar = Object.keys(g.market_cap_percentage);
    for (var k = 0; k < anahtarlar.length; k++) { toplamBilinen += g.market_cap_percentage[anahtarlar[k]]; }
    othersD = Math.max(0, 100 - toplamBilinen);
  }

  function paraFormat(v) {
    if (v == null) return "-";
    if (v >= 1e12) return "$" + (v / 1e12).toFixed(2) + "T";
    if (v >= 1e9) return "$" + (v / 1e9).toFixed(2) + "B";
    if (v >= 1e6) return "$" + (v / 1e6).toFixed(2) + "M";
    return "$" + Math.round(v).toLocaleString();
  }
  function degisimHtml(v) {
    if (v == null) return "";
    var yon = v >= 0 ? "up" : "down";
    var ok = v >= 0 ? "▲" : "▼";
    return '<div class="price-change ' + yon + '">' + ok + ' %' + Math.abs(v).toFixed(2) + '</div>';
  }
  function domBar(deger, renk) {
    if (deger == null) return "";
    return '<div class="dom-bar"><div class="dom-fill" style="width:' + Math.min(100, deger) + '%;background:' + renk + '"></div></div>';
  }

  var html = "";
  html += '<div class="section-title">Canli Fiyatlar</div>';
  html += '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="stat-label">₿ BTC</div><div class="stat-val">' + (btcFiyat != null ? "$" + Math.round(btcFiyat).toLocaleString() : "-") + '</div>' + degisimHtml(btcDegisim) + '</div>';
  html += '<div class="stat-card"><div class="stat-label">Ξ ETH</div><div class="stat-val">' + (ethFiyat != null ? "$" + Math.round(ethFiyat).toLocaleString() : "-") + '</div>' + degisimHtml(ethDegisim) + '</div>';
  html += '</div>';

  html += '<div class="stat-card" style="margin-bottom:16px">';
  html += '<div class="stat-label">TOTAL PIYASA DEGERI</div>';
  html += '<div class="stat-val">' + paraFormat(toplamDeger) + '</div>';
  html += degisimHtml(toplamDegisim);
  html += '</div>';

  html += '<div class="section-title">Dominans</div>';
  html += '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="stat-label">BTC.D</div><div class="stat-val" style="color:#f59e0b">' + (btcD != null ? "%" + btcD.toFixed(1) : "-") + '</div>' + domBar(btcD, "#f59e0b") + '</div>';
  html += '<div class="stat-card"><div class="stat-label">ETH.D</div><div class="stat-val blue">' + (ethD != null ? "%" + ethD.toFixed(1) : "-") + '</div>' + domBar(ethD, "#60a5fa") + '</div>';
  html += '<div class="stat-card"><div class="stat-label">OTHERS.D</div><div class="stat-val" style="color:#a78bfa">' + (othersD != null ? "%" + othersD.toFixed(1) : "-") + '</div>' + domBar(othersD, "#a78bfa") + '</div>';
  html += '<div class="stat-card"><div class="stat-label">USDT.D</div><div class="stat-val green">' + (usdtD != null ? "%" + usdtD.toFixed(1) : "-") + '</div>' + domBar(usdtD, "#4ade80") + '</div>';
  html += '</div>';

  html += '<div style="text-align:center;margin-top:8px"><button class="refresh-btn" onclick="piyasaYukle(true)">Yenile</button></div>';
  html += '<div class="sig-time" style="text-align:center;margin-top:6px">Son guncelleme: ' + new Date(piyasaSonGuncelleme).toLocaleTimeString("tr-TR") + '</div>';

  document.getElementById("piyasa-icerik").innerHTML = html;
}

function haberleriGoster() {
  var html = "";
  var liste = tumHaberler;
  if (aktifHaberKategori !== "hepsi") {
    liste = tumHaberler.filter(function(h) {
      return h.kategori && h.kategori.toLowerCase() === aktifHaberKategori;
    });
  }
  if (liste.length === 0) {
    html = '<div class="empty">Henuz haber yok</div>';
    document.getElementById("haber-listesi").innerHTML = html;
    return;
  }
  for (var i = 0; i < liste.length; i++) {
    var h = liste[i];
    var deger = h.deger || "notr";
    html += '<div class="news-card ' + deger + '">';
    html += '<div class="news-header"><div class="news-badges">';
    if (h.kategori) html += '<span class="badge kripto">' + h.kategori + '</span>';
    if (h.deger) html += '<span class="badge ' + deger + '">' + (deger === "pozitif" ? "Pozitif" : deger === "negatif" ? "Negatif" : "Notr") + '</span>';
    html += '</div></div>';
    html += '<div class="news-title">' + (h.baslik || "") + '</div>';
    if (h.maddeler && h.maddeler.length > 0) {
      html += '<ul class="news-bullets">';
      for (var j = 0; j < h.maddeler.length; j++) {
        html += '<li class="news-bullet">' + h.maddeler[j] + '</li>';
      }
      html += '</ul>';
    }
    html += '<div class="news-time">' + (h.zaman || "") + '</div></div>';
  }
  document.getElementById("haber-listesi").innerHTML = html;
}

function sekmeAc(id, el) {
  aktifSekme = id;
  var tablar = document.querySelectorAll(".tab");
  for (var i = 0; i < tablar.length; i++) tablar[i].classList.remove("active");
  el.classList.add("active");
  var divlar = document.querySelectorAll(".content > div");
  for (var i = 0; i < divlar.length; i++) divlar[i].style.display = "none";
  document.getElementById(id).style.display = "block";
  guncelle();
}

function botFiltre(bot, el) {
  aktifBot = bot;
  var btnlar = document.querySelectorAll("#sinyaller .bot-btn");
  for (var i = 0; i < btnlar.length; i++) btnlar[i].classList.remove("active");
  el.classList.add("active");
  sinyalleriGoster();
}

function haberFiltre(kategori, el) {
  aktifHaberKategori = kategori;
  var btnlar = document.querySelectorAll("#haberler .bot-btn");
  for (var i = 0; i < btnlar.length; i++) btnlar[i].classList.remove("active");
  el.classList.add("active");
  haberleriGoster();
}

veriYukle();
setInterval(veriYukle, 10000);
</script>
